<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "ISI_APIKEY_KAMU",
authDomain: "database-login-korwil.firebaseapp.com",
projectId: "database-login-korwil",
storageBucket: "database-login-korwil.appspot.com",
messagingSenderId: "663218835658",
appId: "1:663218835658:web:6aef61ba7e8c19415ba433"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then((userCredential)=>{

alert("Login berhasil");

window.location.href="dashboard.html";

})
.catch((error)=>{

alert("Email atau password salah");

});

}

</script>
